apiVersion: apps/v1
kind: Deployment
metadata:
  name: recipe-calculator
  labels:
    app: recipe-calculator
spec:
  replicas: 1
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: recipe-calculator
  template:
    metadata:
      labels:
        app: recipe-calculator
    spec:
      containers:
        - name: recipe-calculator
          image: ghcr.io/dancavallaro/recipe-calculator/recipe-calculator:0.1.0
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: recipe-calculator
spec:
  selector:
    app: recipe-calculator
  ports:
    - port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: recipe-calculator
spec:
  parentRefs:
    - name: private-gateway
      namespace: default
      sectionName: websecure
  hostnames:
    - recipes.o.cavnet.cloud
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: recipe-calculator
          port: 80
