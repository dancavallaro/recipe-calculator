apiVersion: apps/v1
kind: Deployment
metadata:
  name: cook-calc
  labels:
    app: cook-calc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cook-calc
  template:
    metadata:
      labels:
        app: cook-calc
    spec:
      containers:
        - name: cook-calc
          image: cook-calc:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "50m"
---
apiVersion: v1
kind: Service
metadata:
  name: cook-calc
spec:
  selector:
    app: cook-calc
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cook-calc
spec:
  hostnames:
    - cook-calc.example.com
  rules:
    - backendRefs:
        - name: cook-calc
          port: 80
